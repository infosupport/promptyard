# .github/workflows/publish.yml
name: Publish to npm

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to create GitHub release
      id-token: write # needed for npm provenance
    steps:
      - uses: actions/checkout@v5

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun ci

      - name: Compile native executables
        run: |
          bun run compile-windows-x64
          bun run compile-windows-arm64
          bun run compile-linux-x64
          bun run compile-linux-arm64
          bun run compile-macos-arm64

      - name: Publish to npm
        run: |
          bunx npm set //registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
          bun publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*"
          working-directory: dist
