name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - 'apps/server/**'

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: acrpromptyard
  IMAGE_NAME: promptyard

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build
        run: ./mvnw -pl apps/server package -DskipTests

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name $ACR_NAME

      - name: Build and push image
        working-directory: apps/server
        run: |
          docker build -f src/main/docker/Dockerfile.jvm -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} .
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
