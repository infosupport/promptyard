name: Server CI

on:
  push:
    branches: [main]
    paths:
      - "apps/server/**"
      - ".github/workflows/server-ci.yml"

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: acrpromptyard
  IMAGE_NAME: promptyard

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10.26.2"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/server/src/main/webui/pnpm-lock.yaml

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build and test
        run: ./mvnw -pl apps/server package

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name $ACR_NAME

      - name: Build and push server image
        run: |
          ./mvnw -pl apps/server package \
            -Dquarkus.container-image.build=true \
            -Dquarkus.container-image.push=true \
            -Dquarkus.container-image.registry=$ACR_NAME.azurecr.io \
            -Dquarkus.container-image.group=infosupport \
            -Dquarkus.container-image.name=promptyard \
            -Dquarkus.container-image.tag=${{ github.sha }}
