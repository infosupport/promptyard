apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/server
  - sealed-secret.yaml
namespace: promptyard-dev
images:
  - name: ghcr.io/infosupport/promptyard
    newTag: 0024ef5e517a233113c2027978be5852abe6780f
configMapGenerator:
  - name: promptyard-server-config
    literals:
      - QUARKUS_OIDC_AUTH_SERVER_URL=<your-oidc-auth-server-url>
      - QUARKUS_OIDC_CLIENT_ID=<your-oidc-client-id>
      - QUARKUS_DATASOURCE_JDBC_URL=<your-jdbc-url>
      - QUARKUS_OPENSEARCH_HOSTS=<your-opensearch-hosts>
generatorOptions:
  disableNameSuffixHash: true
patches:
  - target:
      kind: Deployment
      name: promptyard-server
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: promptyard-server
      spec:
        template:
          spec:
            containers:
              - name: server
                env:
                  - name: QUARKUS_DATASOURCE_USERNAME
                    valueFrom:
                      secretKeyRef:
                        name: promptyard-dev.postgres.credentials.postgresql.acid.zalan.do
                        key: username
                  - name: QUARKUS_DATASOURCE_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: promptyard-dev.postgres.credentials.postgresql.acid.zalan.do
                        key: password

