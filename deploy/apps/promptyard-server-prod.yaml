apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promptyard-server-prod
  namespace: argocd                          
spec:
  project: default                          
  source:
    repoURL: git@github.com:infosupport/promptyard.git
    targetRevision: main                   
    path: deploy/envs/prod/server
  destination:
    server: https://kubernetes.default.svc  
    namespace: promptyard-prod             
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
