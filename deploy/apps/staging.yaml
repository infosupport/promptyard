apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promptyard-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/infosupport/promptyard.git
    targetRevision: gitops-configuration
    path: deploy/envs/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: promptyard-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
